  /* ══════════════════════════════════════════════════════════════
     TAB SWITCHING
  ══════════════════════════════════════════════════════════════ */
  _switchTab(tab){
    // When leaving EEG, restore ECG overrides
    if(tab==='ecg' && this.eeg?.chViews?.length || tab==='ecg' && this.eeg?.singleView){
      this._eegSwapOverrides('out');
    }
    // When entering EEG with active views, re-apply EEG overrides
    if(tab==='eeg' && (this.eeg?.chViews?.length || this.eeg?.singleView)){
      this._eegSwapOverrides('in');
    }
    document.getElementById('tabBtnECG').classList.toggle('active', tab==='ecg');
    document.getElementById('tabBtnEEG').classList.toggle('active', tab==='eeg');
    document.getElementById('paneECG').classList.toggle('active', tab==='ecg');
    document.getElementById('paneEEG').classList.toggle('active', tab==='eeg');
  }

  /* ══════════════════════════════════════════════════════════════
     EEG — STATE
  ══════════════════════════════════════════════════════════════ */
  _initEEGState(){
    this.eeg = {
      ss: new SignalService(),
      as: new AnimationService(),
      chViews: [], singleView: null,
      scatterView: null, polarView: null, polar2View: null,
      xorView: null, digitalXorView: null,
      lastR: null, lastP: null, lastP2: null, lastXor: null,
      chColorOverrides: {}, chThickOverrides: [],
      globalScaleY: 1,
    };
    this.eeg.as.start();
  }

  /* ══════════════════════════════════════════════════════════════
     EEG — FILE HANDLING
  ══════════════════════════════════════════════════════════════ */
  _handleEEGFiles(files){
    if(!files||!files.length)return;
    const arr=Array.from(files);
    const edfFile=arr.find(f=>f.name.toLowerCase().endsWith('.edf'));
    const heaFile=arr.find(f=>f.name.toLowerCase().endsWith('.hea'));
    const csvFile=arr.find(f=>f.name.toLowerCase().endsWith('.csv'));
    this._showEEGError('');
    if(edfFile){ this._uploadEEG([edfFile]); }         // single EDF — send to backend
    else if(heaFile){ this._uploadEEG(arr); }           // WFDB bundle
    else if(csvFile){ this._readEEGCSV(csvFile); }
    else{ this._showEEGError('No .edf or .hea file found. Drop a single .edf file, all WFDB record files (.hea + .dat + companions), or a .csv for preview.'); }
  }

  _showEEGError(msg){
    const el=document.getElementById('eegErrorBanner');
    el.textContent=msg; el.classList.toggle('show',!!msg);
  }

  _uploadEEG(allFiles){
    this._resetEEGView();
    const zone=document.getElementById('eegUploadZone');
    zone.classList.add('uploading');
    const xhr=new XMLHttpRequest();
    xhr.open('POST',`${API_BASE}/upload-eeg/`);
    xhr.upload.onprogress=e=>{ if(e.lengthComputable) console.log(`EEG ${Math.round(e.loaded/e.total*100)}%`); };
    xhr.onload=()=>{
      zone.classList.remove('uploading');
      if(xhr.status>=200&&xhr.status<300){
        try{ this._loadEEGData(JSON.parse(xhr.responseText)); }
        catch(e){ this._showEEGError('Server returned invalid JSON.'); }
      } else {
        let msg=`HTTP ${xhr.status}`;
        try{ msg=JSON.parse(xhr.responseText).error||msg; }catch(_){}
        this._showEEGError(`Upload failed: ${msg}`);
      }
    };
    xhr.onerror=()=>{ zone.classList.remove('uploading'); this._showEEGError('Cannot reach Django server at port 8000.'); };
    const fd=new FormData();
    allFiles.forEach(f=>fd.append('files',f,f.name));
    xhr.send(fd);
  }

  _readEEGCSV(file){
    this._resetEEGView();
    const reader=new FileReader();
    reader.onload=e=>{
      const rows=e.target.result.split(/\r?\n/).filter(r=>r.trim());
      if(!rows.length){this._showEEGError('Empty CSV.');return;}
      let start=0;
      if(rows[0].split(',').some(v=>isNaN(parseFloat(v.trim()))))start=1;
      const numCh=rows[start].split(',').map(v=>parseFloat(v.trim())).filter(v=>!isNaN(v)).length;
      const channels=Array(numCh).fill(null).map(()=>[]);
      for(let r=start;r<rows.length;r++){
        const vals=rows[r].split(',').map(v=>parseFloat(v.trim()));
        vals.forEach((v,i)=>{if(i<numCh&&!isNaN(v))channels[i].push(v);});
      }
      const sigNames=start&&rows[0].split(',').map(s=>s.trim())||channels.map((_,i)=>`Ch${i+1}`);
      this._loadEEGData({
        record_name: file.name.replace(/\.csv$/i,''),
        fs:256, num_channels:numCh, total_samples:channels[0].length,
        sig_names:sigNames, sig_units:channels.map(()=>'µV'),
        duration_sec:+(channels[0].length/256).toFixed(2),
        time:channels[0].map((_,i)=>i/256),
        channels, num_samples:channels[0].length,
        window_start:0, window_end:channels[0].length,
        ai:null, signal_type:'eeg',
      });
    };
    reader.readAsText(file);
  }

  _resetEEGView(){
    if(!this.eeg) this._initEEGState();
    // If EEG overrides are active, restore ECG ones before destroying
    if(this.eeg.chViews?.length || this.eeg.singleView) this._eegSwapOverrides('out');
    this.eeg.chViews.forEach(v=>v.destroy());
    this.eeg.chViews=[];
    if(this.eeg.singleView){this.eeg.singleView.destroy();this.eeg.singleView=null;}
    ['scatterView','polarView','polar2View','xorView','digitalXorView'].forEach(k=>{
      if(this.eeg[k]){this.eeg[k].destroy?.();this.eeg[k]=null;}
    });
    this.eeg.lastR=this.eeg.lastP=this.eeg.lastP2=this.eeg.lastXor=null;
    document.getElementById('eegChannelsContainer').innerHTML='';
    document.getElementById('eegChannelCustomBody').innerHTML='';
    ['eegPlotModeChoice','eegChannelCustomSection','eegGlobalConfigBar',
     'eegPeriodSection','eegRecurrenceSection','eegPolarSection',
     'eegPolar2Section','eegXorSection','eegDigitalXorWrap'].forEach(id=>{
      const el=document.getElementById(id); if(el) el.style.display='none';
    });
    document.getElementById('eegMetaBar').classList.remove('show');
    document.getElementById('eegAISection').classList.remove('show');
    document.getElementById('eegAICard').innerHTML='<div class="sv-ai-skeleton" id="eegAISkeleton"><div class="sv-ai-skel-line" style="height:20px;width:60%"></div><div class="sv-ai-skel-line" style="height:10px;width:35%"></div><div class="sv-ai-skel-line" style="height:6px;width:100%"></div><div class="sv-ai-skel-line" style="height:60px;width:100%"></div></div>';
  }

  _loadEEGData(data){
    if(!this.eeg) this._initEEGState();
    // Meta bar
    const mb=document.getElementById('eegMetaBar'); mb.classList.add('show');
    document.getElementById('eegMRecord').textContent  = data.record_name||'—';
    document.getElementById('eegMFs').textContent      = data.fs?`${data.fs} Hz`:'—';
    document.getElementById('eegMCh').textContent      = data.num_channels?`${data.num_channels} ch`:'—';
    document.getElementById('eegMDur').textContent     = data.duration_sec?`${data.duration_sec}s`:'—';
    document.getElementById('eegMSamples').textContent = data.total_samples||'—';
    document.getElementById('eegMNames').textContent   = (data.sig_names||[]).slice(0,8).join(', ')+(data.num_channels>8?' …':'');

    // Store in signal service
    const ss=this.eeg.ss;
    ss.set('signalData', data.channels||[]);
    ss.set('numChannels', data.num_channels||0);
    ss.set('numSamples', data.num_samples||0);
    ss.set('recordName', data.record_name||'');
    ss.set('fs', data.fs||256);
    ss.set('sigNames', data.sig_names||[]);
    ss.set('duration', data.duration_sec||0);
    ss.set('windowWidth', 1000);
    ss.set('playbackSpeed', 1);

    // AI
    if(data.ai) this._renderEEGAI(data.ai, data.num_channels, data.fs);

    // Show mode selector
    document.getElementById('eegPlotModeChoice').style.display='block';

    // Bind controls
    this._bindEEGControls();
  }

  _bindEEGControls(){
    // Period slider
    const applyWin=(v)=>{
      const sl=document.getElementById('eegPeriodSlider');
      v=Math.max(parseInt(sl.min)||10,Math.min(parseInt(sl.max)||100000,Math.round(v)));
      if(isNaN(v))return;
      document.getElementById('eegWindowInput').value=v;
      sl.value=v;
      this.eeg.chViews.forEach(cv=>cv.anchorAndResize?.());
      if(this.eeg.singleView) this.eeg.singleView.anchorAndResize?.();
      this.eeg.ss.set('windowWidth',v);
      this._refreshEEGAnalysis();
    };
    const sl=document.getElementById('eegPeriodSlider');
    sl.oninput=e=>applyWin(parseInt(e.target.value));
    const wi=document.getElementById('eegWindowInput');
    wi.oninput=e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v>0)applyWin(v);};
    wi.onblur=e=>{const v=parseInt(e.target.value);applyWin(isNaN(v)?this.eeg.ss.get('windowWidth'):v);};
    wi.onkeydown=e=>{if(e.key==='Enter')e.target.blur();};

    // Speed
    const applySpd=(v)=>{
      v=Math.max(-20,Math.min(20,Math.round(v*10)/10));
      this.eeg.chViews.forEach(cv=>cv.applySpeed?.(v));
      if(this.eeg.singleView) this.eeg.singleView.applySpeed?.(v);
      this.eeg.ss.set('playbackSpeed',v);
      document.getElementById('eegSpeedSlider').value=v;
      document.getElementById('eegSpeedInput').value=v;
    };
    document.getElementById('eegSpeedSlider').oninput=e=>applySpd(parseFloat(e.target.value));
    document.getElementById('eegSpeedInput').oninput=e=>{const v=parseFloat(e.target.value);if(!isNaN(v))applySpd(v);};
    document.getElementById('eegSpeedInput').onblur=e=>{applySpd(isNaN(parseFloat(e.target.value))?1:parseFloat(e.target.value));};

    // Global amp buttons
    document.getElementById('eegGBtnPlay').onclick=()=>this.eeg.chViews.forEach(v=>v.setPlay?.(false));
    document.getElementById('eegGBtnPause').onclick=()=>this.eeg.chViews.forEach(v=>v.setPlay?.(true));
    let gAmp=1;
    const updGAmp=()=>{ document.getElementById('eegGAmpBadge').textContent=`AMP ×${gAmp.toFixed(2)}`; };
    document.getElementById('eegGBtnAI').onclick=()=>{gAmp=Math.min(20,+(gAmp*1.5).toFixed(2));this.eeg.chViews.forEach(v=>{v.scaleY=gAmp;});updGAmp();};
    document.getElementById('eegGBtnAO').onclick=()=>{gAmp=Math.max(0.05,+(gAmp/1.5).toFixed(2));this.eeg.chViews.forEach(v=>{v.scaleY=gAmp;});updGAmp();};
    document.getElementById('eegGBtnReset').onclick=()=>{gAmp=1;this.eeg.chViews.forEach(v=>{v.scaleY=1;v.windowStart=0;});updGAmp();};

    // Mode buttons
    document.getElementById('eegBtnSep').onclick=()=>this._eegActivateSeparate();
    document.getElementById('eegBtnSingle').onclick=()=>this._eegActivateSingle();

    // Analysis buttons
    document.getElementById('eegBtnRenderR').onclick=()=>this._renderEEGRecurrence();
    document.getElementById('eegBtnRenderP').onclick=()=>this._renderEEGPolar();
    document.getElementById('eegBtnRenderP2').onclick=()=>this._renderEEGPolar2();
    document.getElementById('eegBtnRenderXor').onclick=()=>this._renderEEGXor();
    document.getElementById('eegXorThresh').oninput=e=>{
      document.getElementById('eegXorThreshVal').textContent=e.target.value+'%';
    };
  }

  _eegActivateSeparate(){
    document.getElementById('eegPlotModeChoice').style.display='none';
    document.getElementById('eegChannelCustomSection').style.display='none';
    document.getElementById('eegGlobalConfigBar').style.display='block';
    this._eegBindGlobalConfigBar();
    // Destroy old views
    this.eeg.chViews.forEach(v=>v.destroy());this.eeg.chViews=[];
    if(this.eeg.singleView){this.eeg.singleView.destroy();this.eeg.singleView=null;}
    // Swap global color/thick overrides to EEG overrides so ChannelView picks them up
    this._eegSwapOverrides('in');
    const container=document.getElementById('eegChannelsContainer');
    container.innerHTML='';
    const n=this.eeg.ss.get('numChannels');
    for(let i=0;i<n;i++){
      const cv=new ChannelView(container,i,this.eeg.ss,this.eeg.as);
      this.eeg.chViews.push(cv);
    }
    this._eegSetupAnalysis();
    ['eegPeriodSection','eegRecurrenceSection','eegPolarSection','eegPolar2Section','eegXorSection'].forEach(id=>{
      document.getElementById(id).style.display='block';
    });
  }

  _eegActivateSingle(){
    document.getElementById('eegPlotModeChoice').style.display='none';
    document.getElementById('eegChannelCustomSection').style.display='block';
    document.getElementById('eegGlobalConfigBar').style.display='none';
    this.eeg.chViews.forEach(v=>v.destroy());this.eeg.chViews=[];
    if(this.eeg.singleView){this.eeg.singleView.destroy();this.eeg.singleView=null;}
    this._eegSwapOverrides('in');
    const container=document.getElementById('eegChannelsContainer');
    container.innerHTML='';
    this.eeg.singleView=new SingleView(container,this.eeg.ss,this.eeg.as);
    this._eegSetupCustomizationSingle();
    this._eegSetupAnalysis();
    ['eegPeriodSection','eegRecurrenceSection','eegPolarSection','eegPolar2Section','eegXorSection'].forEach(id=>{
      document.getElementById(id).style.display='block';
    });
  }

  /* Swap color/thick overrides between ECG store and EEG store */
  _eegSwapOverrides(dir){
    if(dir==='in'){
      // Save ECG overrides
      this._ecgColorSave={...channelColorOverrides};
      this._ecgThickSave={...channelThickOverrides};
      // Load EEG overrides into globals
      Object.keys(channelColorOverrides).forEach(k=>delete channelColorOverrides[k]);
      Object.keys(channelThickOverrides).forEach(k=>delete channelThickOverrides[k]);
      if(this.eeg.chColorOverrides) Object.assign(channelColorOverrides,this.eeg.chColorOverrides);
      if(this.eeg.chThickOverrides) this.eeg.chThickOverrides.forEach((v,i)=>{if(v!=null)channelThickOverrides[i]=v;});
    } else {
      // Save EEG overrides back
      this.eeg.chColorOverrides={...channelColorOverrides};
      this.eeg.chThickOverrides=[];
      Object.entries(channelThickOverrides).forEach(([k,v])=>{this.eeg.chThickOverrides[+k]=v;});
      // Restore ECG overrides
      Object.keys(channelColorOverrides).forEach(k=>delete channelColorOverrides[k]);
      Object.keys(channelThickOverrides).forEach(k=>delete channelThickOverrides[k]);
      if(this._ecgColorSave) Object.assign(channelColorOverrides,this._ecgColorSave);
      if(this._ecgThickSave) Object.assign(channelThickOverrides,this._ecgThickSave);
    }
  }

  _eegBindGlobalConfigBar(){
    let gScaleY=1;
    const upd=()=>{ document.getElementById('eegGAmpBadge').textContent=`AMP ×${gScaleY.toFixed(2)}`; };
    document.getElementById('eegGBtnPlay').onclick=()=>{
      const speed=this.eeg.ss.get('playbackSpeed')||1;
      this.eeg.chViews.forEach(cv=>{if(cv.paused){cv.windowStart=cv.frozenStart-this.eeg.as.t*speed;cv.paused=false;}});
    };
    document.getElementById('eegGBtnPause').onclick=()=>{
      this.eeg.chViews.forEach(cv=>{cv.frozenStart=cv._leftEdge(this.eeg.as.t);cv.paused=true;});
    };
    document.getElementById('eegGBtnAI').onclick=()=>{gScaleY=Math.min(20,gScaleY*1.5);this.eeg.chViews.forEach(cv=>{cv.scaleY=gScaleY;cv._updateBadge?.();});upd();};
    document.getElementById('eegGBtnAO').onclick=()=>{gScaleY=Math.max(0.05,gScaleY/1.5);this.eeg.chViews.forEach(cv=>{cv.scaleY=gScaleY;cv._updateBadge?.();});upd();};
    document.getElementById('eegGBtnReset').onclick=()=>{gScaleY=1;this.eeg.chViews.forEach(cv=>{cv.scaleY=1;cv.windowStart=0;cv._updateBadge?.();});upd();};
  }

  _eegSetupAnalysis(){
    const n=this.eeg.ss.get('numChannels'),names=this.eeg.ss.get('sigNames');
    const mkOpts=sel=>{sel.innerHTML='';for(let i=0;i<n;i++){const o=document.createElement('option');o.value=i;o.textContent=names[i]||`Ch ${i+1}`;sel.appendChild(o);}};
    mkOpts(document.getElementById('eegRCh1'));mkOpts(document.getElementById('eegRCh2'));
    if(n>=2)document.getElementById('eegRCh2').selectedIndex=1;
    mkOpts(document.getElementById('eegXorCh'));
    mkOpts(document.getElementById('eegPCh'));
    mkOpts(document.getElementById('eegP2Ch1'));mkOpts(document.getElementById('eegP2Ch2'));
    if(n>=2)document.getElementById('eegP2Ch2').selectedIndex=1;
  }

  _eegSetupCustomizationSingle(){
    const body=document.getElementById('eegChannelCustomBody');
    body.innerHTML='';
    const n=this.eeg.ss.get('numChannels'),names=this.eeg.ss.get('sigNames');
    // Mirror the ECG _buildCustomSection logic, syncing SingleView legend
    onChannelColorChange.length=0;
    onChannelColorChange.push((idx,color)=>{
      if(this.eeg.singleView?.updateLegendColor) this.eeg.singleView.updateLegendColor(idx,color);
      if(!this.eeg.chColorOverrides) this.eeg.chColorOverrides={};
      this.eeg.chColorOverrides[idx]=color;
      const cardDot=body.querySelector(`[data-dot="${idx}"]`);
      const cardPrev=body.querySelector(`[data-prev="${idx}"]`);
      const cardInput=body.querySelector(`[data-ci="${idx}"]`);
      if(cardDot){cardDot.style.background=color;cardDot.style.boxShadow=`0 0 6px ${color}77`;}
      if(cardPrev) cardPrev.style.background=color;
      if(cardInput) cardInput.value=color;
    });
    for(let i=0;i<n;i++){
      const idx=i;
      const defaultColor=CHANNEL_COLORS[idx%CHANNEL_COLORS.length];
      const currentColor=channelColorOverrides[idx]||defaultColor;
      const currentThick=channelThickOverrides[idx]||1.5;
      const card=document.createElement('div');
      card.style.cssText='background:var(--panel-raised);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;width:220px;flex:0 0 220px;box-sizing:border-box;display:flex;flex-direction:column;gap:12px;overflow:hidden;';
      const hdr=document.createElement('div'); hdr.style.cssText='display:flex;align-items:center;gap:8px;';
      const dot=document.createElement('div'); dot.setAttribute('data-dot',idx);
      dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${currentColor};box-shadow:0 0 6px ${currentColor}77;flex-shrink:0;`;
      const lbl=document.createElement('span'); lbl.style.cssText='font-family:var(--font-mono);font-size:10px;color:var(--text-1);letter-spacing:.06em;';
      lbl.textContent=names[idx]||`Ch ${idx+1}`;
      hdr.append(dot,lbl);
      const colorRow=document.createElement('div'); colorRow.style.cssText='display:flex;align-items:center;gap:8px;width:100%;';
      const cLabel=document.createElement('span'); cLabel.className='sv-cust-label'; cLabel.textContent='Color';
      const swatchWrap=document.createElement('div'); swatchWrap.className='sv-color-swatch'; swatchWrap.title='Pick color';
      const ci=document.createElement('input'); ci.type='color'; ci.value=currentColor; ci.setAttribute('data-ci',idx);
      const cprev=document.createElement('div'); cprev.className='sv-color-preview'; cprev.style.background=currentColor; cprev.setAttribute('data-prev',idx);
      swatchWrap.append(cprev,ci);
      const defBtn=document.createElement('button'); defBtn.className='sv-btn'; defBtn.type='button'; defBtn.textContent='↺'; defBtn.title='Reset'; defBtn.style.fontSize='10px';
      colorRow.append(cLabel,swatchWrap,defBtn);
      const thickRow=document.createElement('div'); thickRow.style.cssText='display:flex;align-items:center;gap:8px;width:100%;overflow:hidden;';
      const tLabel=document.createElement('span'); tLabel.className='sv-cust-label'; tLabel.textContent='Width';
      const ts=document.createElement('input'); ts.type='range'; ts.min='0.5'; ts.max='6'; ts.step='0.5'; ts.value=currentThick; ts.className='sv-thick-slider'; ts.style.cssText='flex:1;min-width:0;max-width:none;';
      const tv=document.createElement('span'); tv.className='sv-thick-val'; tv.textContent=`${currentThick}px`;
      thickRow.append(tLabel,ts,tv);
      card.append(hdr,colorRow,thickRow);
      body.appendChild(card);
      ci.addEventListener('input',()=>{ setChannelColor(idx,ci.value); });
      defBtn.onclick=()=>{ delete channelColorOverrides[idx]; setChannelColor(idx,defaultColor); };
      ts.addEventListener('input',()=>{ const v=parseFloat(ts.value); channelThickOverrides[idx]=v; tv.textContent=`${v}px`; if(!this.eeg.chThickOverrides)this.eeg.chThickOverrides=[]; this.eeg.chThickOverrides[idx]=v; });
    }
  }

  _refreshEEGAnalysis(){
    if(this.eeg.lastR) this._renderEEGRecurrence();
    if(this.eeg.lastP) this._renderEEGPolar();
    if(this.eeg.lastP2) this._renderEEGPolar2();
    if(this.eeg.lastXor) this._renderEEGXor();
  }

  _renderEEGRecurrence(){
    const sd=this.eeg.ss.get('signalData');
    const ci=+document.getElementById('eegRCh1').value, cj=+document.getElementById('eegRCh2').value;
    if(!sd[ci]||!sd[cj])return;
    if(this.eeg.scatterView){this.eeg.scatterView.destroy();this.eeg.scatterView=null;}
    ['eegBtnSnapR','eegBtnResetR'].forEach(id=>document.getElementById(id).style.display='inline-flex');
    document.getElementById('eegScatterZoomBadge').style.display='inline-block';
    this.eeg.scatterView=new ScatterView(document.getElementById('eegRecurrenceCanvas'),sd[ci],sd[cj],ci,cj,this.eeg.as,document.getElementById('eegBtnSnapR'),document.getElementById('eegBtnResetR'),document.getElementById('eegScatterZoomBadge'));
    this.eeg.lastR={ci,cj};
  }

  _renderEEGPolar(){
    const sd=this.eeg.ss.get('signalData'),period=this.eeg.ss.get('windowWidth');
    const ci=+document.getElementById('eegPCh').value;
    if(!sd[ci]?.length)return;
    if(this.eeg.polarView){this.eeg.polarView.destroy();this.eeg.polarView=null;}
    ['eegBtnSnapP','eegBtnResetP'].forEach(id=>document.getElementById(id).style.display='inline-flex');
    document.getElementById('eegPolarZoomBadge').style.display='inline-block';
    this.eeg.polarView=new PolarView(document.getElementById('eegPolarCanvas'),sd[ci],ci,period,this.eeg.as,document.getElementById('eegBtnSnapP'),document.getElementById('eegBtnResetP'),document.getElementById('eegPolarZoomBadge'));
    this.eeg.lastP={ci};
  }

  _renderEEGPolar2(){
    const sd=this.eeg.ss.get('signalData'),period=this.eeg.ss.get('windowWidth');
    const ci=+document.getElementById('eegP2Ch1').value, cj=+document.getElementById('eegP2Ch2').value;
    if(!sd[ci]||!sd[cj])return;
    if(this.eeg.polar2View){this.eeg.polar2View.destroy();this.eeg.polar2View=null;}
    ['eegBtnSnapP2','eegBtnResetP2'].forEach(id=>document.getElementById(id).style.display='inline-flex');
    document.getElementById('eegPolar2ZoomBadge').style.display='inline-block';
    this.eeg.polar2View=new PolarRatioView(document.getElementById('eegPolar2Canvas'),sd[ci],sd[cj],ci,cj,period,this.eeg.as,document.getElementById('eegBtnSnapP2'),document.getElementById('eegBtnResetP2'),document.getElementById('eegPolar2ZoomBadge'));
    this.eeg.lastP2={ci,cj};
  }

  _renderEEGXor(){
    const sd=this.eeg.ss.get('signalData');
    const ci=+document.getElementById('eegXorCh').value;
    const threshold=+document.getElementById('eegXorThresh').value;
    if(!sd[ci]?.length)return;
    if(this.eeg.xorView){this.eeg.xorView.destroy();this.eeg.xorView=null;}
    this.eeg.xorView=new XorView(document.getElementById('eegXorCanvas'),sd[ci],ci,this.eeg.ss.get('windowWidth'),threshold,document.getElementById('eegBtnSnapXor'),document.getElementById('eegXorChunkBadge'),document.getElementById('eegXorStats'));
    if(this.eeg.digitalXorView){this.eeg.digitalXorView.destroy();this.eeg.digitalXorView=null;}
    document.getElementById('eegDigitalXorWrap').style.display='block';
    this.eeg.digitalXorView=new DigitalXorView(document.getElementById('eegDigitalXorCanvas'),sd[ci],ci,this.eeg.ss.get('windowWidth'),threshold,document.getElementById('eegBtnSnapDXor'));
    this.eeg.lastXor={ci,threshold};
  }

  _renderEEGAI(ai, numCh, fs){
    const sec=document.getElementById('eegAISection');
    sec.classList.add('show');
    const card=document.getElementById('eegAICard');
    document.getElementById('eegAISkeleton')?.remove();
    const col=ai.primary?.color||'#718096';
    const conf=Math.round((ai.primary?.confidence||0)*100);
    const sev=ai.primary?.severity||'info';
    const sevBg={'normal':'rgba(104,211,145,.08)','critical':'rgba(252,129,129,.08)','warning':'rgba(246,173,85,.08)','info':'rgba(99,179,237,.08)'};
    card.innerHTML=`
      <div><div class="sv-ai-result-label" style="color:${col}">${ai.primary?.label||'—'}</div>
      <div class="sv-ai-result-sub">${ai.primary?.code||''} · BIOT TRANSFORMER · EEG</div></div>
      <div class="sv-ai-conf-row">
        <div class="sv-ai-conf-track"><div class="sv-ai-conf-fill" style="width:${conf}%;background:${col}"></div></div>
        <div class="sv-ai-conf-num" style="color:${col}">${conf}%</div>
      </div>
      <div class="sv-ai-card-desc" style="border-color:${col};background:${sevBg[sev]||sevBg.info}">${ai.primary?.description||''}</div>
      ${ai.primary?.action?`<div class="sv-ai-card-action">⚡ ${ai.primary.action}</div>`:''}
      ${(ai.findings||[]).length>1?`
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">ALL FINDINGS</div>
      <div class="sv-ai-mini-findings">${(ai.findings||[]).map(f=>`
        <div class="sv-ai-mini-finding">
          <div class="sv-ai-mini-dot" style="background:${f.color}"></div>
          <span style="flex:0 0 180px;font-size:11px">${f.label}</span>
          <div class="sv-ai-mini-bar-wrap"><div class="sv-ai-mini-bar" style="width:${Math.round(f.confidence*100)}%;background:${f.color}"></div></div>
          <span class="sv-ai-mini-pct">${Math.round(f.confidence*100)}%</span>
        </div>`).join('')}</div>`:''}
      <div style="font-family:var(--font-mono);font-size:9px;color:var(--text-3);border-top:1px solid var(--border);padding-top:8px;margin-top:4px">
        ${ai.model_note||''} · ${numCh} channels · ${fs} Hz
      </div>`;
  }

  /* old simple channel builder kept as fallback but superseded by mode system */
  _buildEEGChannels(data){ /* handled via _eegActivateSeparate/_eegActivateSingle */ }
}

document.addEventListener('DOMContentLoaded',()=>new App(document.getElementById('app')));
</script>
</body>
</html>
