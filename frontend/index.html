<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signal Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


<h2>Signal Viewer</h2>

<div class="controls">
    <input type="file" id="fileInput" accept=".csv">
    <button onclick="togglePlay()">Play / Pause</button>

    Zoom:
    <input type="range" id="zoomControl" min="1" max="20" value="1">

    Show Signal:
    <input type="checkbox" id="channelToggle" checked>
</div>

<canvas id="viewer" width="900" height="400"></canvas>

<script src="script.js"></script>
</body>
</html>
